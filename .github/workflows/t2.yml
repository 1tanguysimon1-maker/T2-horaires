name: Fetch T2 Porte de Versailles

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write parser
        run: |
          cat > parse.py << 'EOF'
import json, sys
from datetime import datetime, timezone
data = json.load(sys.stdin)
visits = data['Siri']['ServiceDelivery']['StopMonitoringDelivery'][0]['MonitoredStopVisit']
now = datetime.now(timezone.utc)
out = {'updated_at': now.strftime('%Y-%m-%dT%H:%M:%SZ'), 'departures': []}
for v in visits[:4]:
    dt_str = v['MonitoredVehicleJourney']['MonitoredCall']['ExpectedDepartureTime']
    dt = datetime.fromisoformat(dt_str.replace('Z', '+00:00'))
    out['departures'].append({'time': dt.strftime('%H:%M'), 'minutes': max(0, int((dt - now).total_seconds() // 60))})
print(json.dumps(out, indent=2))
EOF

      - name: Fetch IDFM & transform
        run: |
          curl -s -X GET \
            'https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=STIF%3AStopArea%3ASP%3A25633%3A&LineRef=STIF%3ALine%3A%3AC01390%3A' \
            -H 'accept: application/json' \
            -H 'apikey: ${{ secrets.IDFM_API_KEY }}' \
          | python3 parse.py > t2.json

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add t2.json
          git diff --cached --quiet || git commit -m "chore: update t2 departures" && git push
