<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, height=480">
  <title>T2 – Porte de Versailles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 800px;
      height: 480px;
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
      color: #ffffff;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border-bottom: 3px solid #e3051b;
      padding: 12px 24px;
      height: 80px;
      gap: 20px;
    }

    .logo-t2 {
      width: 58px;
      height: 58px;
      flex-shrink: 0;
    }

    .header-text {
      flex: 1;
    }

    .header-title {
      font-size: 15px;
      color: #aaaaaa;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .header-station {
      font-size: 26px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 1px;
    }

    .header-updated {
      font-size: 12px;
      color: #666666;
      text-align: right;
      align-self: flex-end;
    }

    /* DESTINATION BAR */
    .destination-bar {
      background: #e3051b;
      padding: 8px 24px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #ffffff;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .destination-bar::before {
      content: '▶';
      font-size: 10px;
    }

    /* TABLE HEADER */
    .table-header {
      display: grid;
      grid-template-columns: 1fr 180px 160px;
      padding: 10px 24px;
      background: #222222;
      border-bottom: 1px solid #333;
      font-size: 12px;
      color: #888888;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* DEPARTURES */
    .departures {
      padding: 0 24px;
    }

    .departure-row {
      display: grid;
      grid-template-columns: 1fr 180px 160px;
      align-items: center;
      padding: 0;
      height: 80px;
      border-bottom: 1px solid #1e1e1e;
    }

    .departure-row:last-child {
      border-bottom: none;
    }

    .dep-destination {
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .dep-time {
      font-size: 36px;
      font-weight: bold;
      color: #f5c518;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }

    .dep-minutes {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .dep-minutes-num {
      font-size: 42px;
      font-weight: bold;
      color: #00c853;
      font-variant-numeric: tabular-nums;
    }

    .dep-minutes-num.urgent {
      color: #e3051b;
    }

    .dep-minutes-unit {
      font-size: 16px;
      color: #888888;
    }

    /* FOOTER */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #111111;
      border-top: 1px solid #222;
      padding: 8px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 36px;
    }

    .footer-ratp {
      font-size: 11px;
      color: #444;
      letter-spacing: 1px;
    }

    .footer-line {
      font-size: 11px;
      color: #444;
    }

    /* LOADING / ERROR */
    .status-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <!-- Logo T2 inline SVG (cercle bleu avec T2) -->
    <svg class="logo-t2" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="#0055A4"/>
      <text x="50" y="66" font-family="Arial" font-weight="bold" font-size="42"
            fill="white" text-anchor="middle">T2</text>
    </svg>
    <div class="header-text">
      <div class="header-title">Tramway ligne 2 — Prochains départs</div>
      <div class="header-station">Porte de Versailles</div>
    </div>
    <div class="header-updated" id="updated">—</div>
  </div>

  <!-- DESTINATION -->
  <div class="destination-bar">
    Direction Pont de Bezons
  </div>

  <!-- TABLE HEADER -->
  <div class="table-header">
    <span>Destination</span>
    <span>Heure</span>
    <span>Attente</span>
  </div>

  <!-- DEPARTURES -->
  <div class="departures" id="departures">
    <div class="status-msg">Chargement…</div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <span class="footer-ratp">RATP · Île-de-France Mobilités</span>
    <span class="footer-line">Données temps réel IDFM PRIM</span>
  </div>

  <script>
    const JSON_URL = 'https://1tanguysimon1-maker.github.io/T2-horaires/t2.json';

    async function load() {
      try {
        const res = await fetch(JSON_URL + '?_=' + Date.now());
        const data = await res.json();

        // Updated at (convert UTC -> Paris time)
        const updatedAt = new Date(data.updated_at);
        document.getElementById('updated').textContent =
          'Mis à jour ' + updatedAt.toLocaleTimeString('fr-FR', {
            hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Paris'
          });

        const container = document.getElementById('departures');
        if (!data.departures || data.departures.length === 0) {
          container.innerHTML = '<div class="status-msg">Aucun départ disponible</div>';
          return;
        }

        container.innerHTML = data.departures.slice(0, 3).map(d => `
          <div class="departure-row">
            <div class="dep-destination">Pont de Bezons</div>
            <div class="dep-time">${d.time}</div>
            <div class="dep-minutes">
              <span class="dep-minutes-num ${d.minutes <= 2 ? 'urgent' : ''}">${d.minutes}</span>
              <span class="dep-minutes-unit">min</span>
            </div>
          </div>
        `).join('');

      } catch (e) {
        document.getElementById('departures').innerHTML =
          '<div class="status-msg">Erreur de chargement</div>';
      }
    }

    load();
    setInterval(load, 60000); // refresh toutes les minutes
  </script>

</body>
</html>
